# IAM nginx directives — paste into Plesk panel.
# Plesk → Domains → <domain> → Apache & nginx Settings →
# "Additional nginx directives" (the HTTPS box).
#
# These directives are injected inside Plesk's auto-generated `server { ... }`
# block. Plesk owns the listen / ssl_certificate / root / index lines; we only
# add behavior on top.
#
# Paste from "BEGIN" to "END" (inclusive of the comments — they survive paste
# and document intent for future operators).

# ============================================================
# BEGIN — IAM custom directives
# ============================================================

# --- Security headers ---
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.hsforms.net https://js.hs-scripts.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.hsforms.com https://forms.hubspot.com; frame-src https://forms.hubspot.com; form-action 'self' https://forms.hubspot.com; base-uri 'self'; object-src 'none'; frame-ancestors 'none'" always;

# --- Static asset caching ---
location /media/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}
location ~* \.min\.(js|css)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}
location ~* \.html$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
}

# --- /api/* reverse proxy to the Node app (Plesk's Passenger forwards on 3860) ---
location ~ ^/api/ {
    proxy_pass http://127.0.0.1:3860;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

# --- Default static fallback (Plesk default is `try_files $uri $uri/ /index.html;`).
#     We extend it to also try $uri.html so /pricing → /pricing.html. ---
location / {
    try_files $uri $uri/ $uri.html =404;
}

# --- Deny hidden files except ACME challenges ---
location ~ /\.(?!well-known) {
    deny all;
}

