# IAM staging vhost — iam.abbamarkt.nl
# Managed by Phase M2-02 bootstrap.sh. Coexists with prod (interactivemove.nl) and WordPress vhosts.
# Decisions: D-09..D-15, D-17, D-19 (staging isolation).

# Rate limit zone for /api/chat on staging (D-13). Separate zone name to avoid collision with prod.
# NOTE: limit_req_zone is http{}-context. Ubuntu Nginx includes sites-enabled/* from http{}, so this works.
limit_req_zone $binary_remote_addr zone=chat_staging:10m rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name iam.abbamarkt.nl;

    # ACME challenge (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://iam.abbamarkt.nl$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iam.abbamarkt.nl;

    ssl_certificate     /etc/letsencrypt/live/iam.abbamarkt.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iam.abbamarkt.nl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # M3 English-first redirects (snippet generated from tools/m3-renames.map).
    include /etc/nginx/snippets/iam-redirects.conf;

    root /var/www/iam-staging/current;
    index index.html;

    # --- Security headers (D-14) ---
    # Staging HSTS deliberately short (1h) so we can toggle staging without pinning browsers (agent discretion within D-14 spirit).
    add_header Strict-Transport-Security "max-age=3600" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP mirrors prod so staging exercises the same policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.hsforms.net https://js.hs-scripts.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.hsforms.com https://forms.hubspot.com; frame-src https://forms.hubspot.com; form-action 'self' https://forms.hubspot.com; base-uri 'self'; object-src 'none'; frame-ancestors 'none'" always;

    # --- Static cache (D-15) ---
    location /media/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~* \.min\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # --- /api/chat reverse proxy (D-11, D-13) — staging upstream 3861 ---
    location = /api/chat {
        limit_req zone=chat_staging burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3861;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streaming (SSE) support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- /api/contact reserved for Phase 04 (D-12) ---
    location = /api/contact {
        proxy_pass http://127.0.0.1:3861;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Until Phase 04 implements the handler, upstream returns 404 — surface it as-is.
    }

    # --- Default location: static file serving ---
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Deny hidden files except ACME
    location ~ /\.(?!well-known) {
        deny all;
    }
}
